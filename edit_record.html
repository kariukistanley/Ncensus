{% extends "layout.html" %}
{% block content %}
<h1>Edit Record</h1>
<div class="form-container">
    <form action="/edit/{{ index }}" method="POST">
        <div class="field">
            <label>Full Name</label>
            <input type="text" name="full_name" value="{{ record.full_name }}">
        </div>
        <div class="field">
            <label>Age</label>
            <input type="number" name="age" value="{{ record.age }}">
        </div>
        <button type="submit" class="btn-primary">UPDATE RECORD</button>
        <a href="{{ url_for('review') }}" style="color: gray; margin-left: 10px;">Cancel</a>
    </form>
</div>
{% endblock %}
