<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KNBS - Login Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-page">
    <div class="login-card">
        <div class="logo-circle">KNBS</div>
        <h2 class="mint-text">PORTAL ACCESS</h2>
        <p class="tagline">NATIONAL CENSUS 2026</p>
        
        <form action="/login" method="POST">
            <div class="input-group">
                <input type="text" name="username" placeholder="Staff Username" required>
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-mint">LOG IN TO SYSTEM</button>
        </form>
    </div>
</body>
</html>
