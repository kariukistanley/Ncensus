{% extends "layout.html" %}
{% block content %}
<h1>Review Submissions</h1>
<p>Total records pending verification.</p>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>Full Name</th>
                <th>Age</th>
                <th>Sex</th>
                <th>Relationship</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for record in records %}
            <tr>
                <td>{{ record.full_name }}</td>
                <td>{{ record.age }}</td>
                <td>{{ record.sex }}</td>
                <td>{{ record.relationship }}</td>
                <td>
                    <a href="/edit/{{ loop.index0 }}" class="btn-edit">Edit</a>
                    <a href="#" class="btn-delete">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
